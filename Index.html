<!DOCTYPE html>

    <h1>Практична робота</h1> 
 
    <script src="script.js"></script>  
</body> 
</html> 
<!DOCTYPE html> 
<html> 
<head> 
  <style> 
    /* Стиль для анімації */ 
    #text { 
      transition: all 0.5s ease; /* Плавна зміна за 0.5 сек */ 
      opacity: 1;                /* Видимий */ 
      transform: translateY(0);  /* На місці */ 
    } 
 
    /* Клас, який ми додаватимемо через JS, щоб сховати текст */ 
    .hidden { 
      opacity: 0;                /* Прозорий */ 
      transform: translateY(-20px); /* Трохи злітає вгору */ 
      pointer-events: none;      /* Не можна натиснути, коли він "невидимий" */ 
    } 
  </style> 
</head> 
<body> 
 
<button id="toggleBtn">Показати/Сховати</button> 
<p id="text">Я текст</p> 
<p>Інший текст</p> 
 
<script> 
  const btn = document.getElementById("toggleBtn"); 
  const p = document.getElementById("text"); 
 
  btn.addEventListener("click", () => { 
    // Перевіряємо, чи має параграф клас .hidden 
    if (p.classList.contains("hidden")) { 
      // Якщо він схований -> показуємо і міняємо текст 
      p.textContent = "Новий текст";  
      p.classList.remove("hidden"); 
    } else { 
      // Якщо він видимий -> ховаємо 
      p.classList.add("hidden"); 
    } 
  }); 
</script> 
 
</body> 
</html>
